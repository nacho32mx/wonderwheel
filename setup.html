<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Wonder Wheel</title>
  <link rel="stylesheet" href="styles.css?v=1.17.1">
</head>
<body class="wizard-body">
  <main class="wizard-shell">
    <header class="wizard-header">
      <div>
        <h1>Build Your Wonder Wheel</h1>
        <p class="version-inline">Wonder Wheel v1.17</p>
      </div>
      <a class="utility-link inline-link" href="dashboard.html">Back to Dashboard</a>
    </header>

    <section class="wizard-progress">
      <div class="wizard-step-pill active" data-step-pill="0">Name</div>
      <div class="wizard-step-pill" data-step-pill="1">Ring 1</div>
      <div class="wizard-step-pill" data-step-pill="2" data-ring-step="middle">Ring 2</div>
      <div class="wizard-step-pill" data-step-pill="3" data-ring-step="inner">Ring 3</div>
      <div class="wizard-step-pill" data-step-pill="4" data-ring-step="core">Ring 4</div>
      <div class="wizard-step-pill" data-step-pill="5" data-ring-step="fifth">Ring 5</div>
      <div class="wizard-step-pill" data-step-pill="6" data-ring-step="sixth">Ring 6</div>
      <div class="wizard-step-pill" data-step-pill="7" data-ring-step="seventh">Ring 7</div>
      <div class="wizard-step-pill" data-step-pill="8" data-ring-step="eighth">Ring 8</div>
      <div class="wizard-step-pill" data-step-pill="9" data-ring-step="ninth">Ring 9</div>
      <div class="wizard-step-pill" data-step-pill="10" data-ring-step="tenth">Ring 10</div>
      <div class="wizard-step-pill" data-step-pill="11">Customize</div>
      <div class="wizard-step-pill" data-step-pill="12">Review</div>
    </section>

    <form id="wheelWizardForm" class="wizard-card" novalidate>
      <section class="wizard-step active" data-step="0">
        <h2>Wheel name</h2>
        <label>Wheel name <input id="wizardName" name="wheelName" type="text" placeholder="What is your wheel for?" required></label>
        <label>Number of rings
          <select id="ringCountSelect">
            <option value="1">1 ring</option>
            <option value="2">2 rings</option>
            <option value="3" selected>3 rings</option>
            <option value="4">4 rings</option>
            <option value="5">5 rings</option>
            <option value="6">6 rings</option>
            <option value="7">7 rings</option>
            <option value="8">8 rings</option>
            <option value="9">9 rings</option>
            <option value="10">10 rings</option>
          </select>
        </label>
      </section>

      <section class="wizard-step" data-step="1">
        <h2>Ring 1</h2>
        <label>Ring Name <input id="outerPrompt" name="outerPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="outerContext" name="outerContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="outerCount" name="outerCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="outerInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="2" data-ring-step="middle">
        <h2>Ring 2</h2>
        <label>Ring Name <input id="middlePrompt" name="middlePrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="middleContext" name="middleContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="middleCount" name="middleCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="middleInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="3" data-ring-step="inner">
        <h2>Ring 3</h2>
        <label>Ring Name <input id="innerPrompt" name="innerPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="innerContext" name="innerContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="innerCount" name="innerCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="innerInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="4" data-ring-step="core">
        <h2>Ring 4</h2>
        <label>Ring Name <input id="corePrompt" name="corePrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="coreContext" name="coreContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="coreCount" name="coreCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="coreInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="5" data-ring-step="fifth">
        <h2>Ring 5</h2>
        <label>Ring Name <input id="fifthPrompt" name="fifthPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="fifthContext" name="fifthContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="fifthCount" name="fifthCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="fifthInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="6" data-ring-step="sixth">
        <h2>Ring 6</h2>
        <label>Ring Name <input id="sixthPrompt" name="sixthPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="sixthContext" name="sixthContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="sixthCount" name="sixthCount" required><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></label>
        <div id="sixthInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="7" data-ring-step="seventh">
        <h2>Ring 7</h2>
        <label>Ring Name <input id="seventhPrompt" name="seventhPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="seventhContext" name="seventhContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="seventhCount" name="seventhCount" required></select></label>
        <div id="seventhInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="8" data-ring-step="eighth">
        <h2>Ring 8</h2>
        <label>Ring Name <input id="eighthPrompt" name="eighthPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="eighthContext" name="eighthContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="eighthCount" name="eighthCount" required></select></label>
        <div id="eighthInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="9" data-ring-step="ninth">
        <h2>Ring 9</h2>
        <label>Ring Name <input id="ninthPrompt" name="ninthPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="ninthContext" name="ninthContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="ninthCount" name="ninthCount" required></select></label>
        <div id="ninthInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="10" data-ring-step="tenth">
        <h2>Ring 10</h2>
        <label>Ring Name <input id="tenthPrompt" name="tenthPrompt" type="text" placeholder="Optional name for this ring"></label>
        <label>Context before selection <input id="tenthContext" name="tenthContext" type="text" placeholder="Optional connector, like is / using / with"></label>
        <label>Number of sections <select id="tenthCount" name="tenthCount" required></select></label>
        <div id="tenthInputs" class="wizard-grid"></div>
      </section>

      <section class="wizard-step" data-step="11">
        <h2>Customize</h2>
        <div class="wizard-customize-grid">
          <label>Wheel style
            <select id="wheelFrameSelect">
              <option value="none">None</option>
              <option value="classic-glow">Space</option>
              <option value="arcane">Arcane</option>
              <option value="steampunk">Steampunk</option>
              <option value="neon-circuit">Neon Circuit</option>
              <option value="nature">Koi Pond</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label id="customWheelStyleImageLabel" class="hidden">Custom style image <input id="customWheelStyleImage" type="file" accept="image/*"></label>
          <label>Wheel line color <input id="wheelColor" type="color" value="#ffd700"></label>
          <label class="checkbox-row"><input id="hideWheelLines" type="checkbox" checked> Wheel lines</label>
          <label>Interface color <input id="interfaceColor" type="color" value="#ffffff"></label>
          <label>Text color <input id="textColor" type="color" value="#ffd700"></label>
          <label>Page background color <input id="pageBgColor" type="color" value="#111111"></label>
          <label id="pageBgImageLabel" class="hidden">Upload page background picture <input id="pageBgImage" type="file" accept="image/*"></label>
          <label>Wheel size <input id="wheelSize" type="range" min="0.55" max="3" step="0.05" value="1"></label>
          <label class="checkbox-row"><input id="showWheelLines" type="checkbox" checked> Wheel spokes</label>
          <label class="checkbox-row"><input id="allowSound" type="checkbox"> Audio</label>
          <label id="centerBgLabel" class="hidden">Center background <input id="centerBg" type="file" accept="image/*"></label>
        </div>
      </section>

      <section class="wizard-step" data-step="12">
        <h2>Review</h2>
        <div id="wizardReview" class="review-box"></div>
      </section>

      <div class="wizard-actions">
        <button id="backButton" type="button">Back</button>
        <button id="nextButton" type="button">Next</button>
        <button id="finishButton" class="primary-button hidden" type="submit">Create Wheel</button>
      </div>
    </form>
  </main>
  <script src="setup.js?v=1.17.1"></script>
</body>
</html>
